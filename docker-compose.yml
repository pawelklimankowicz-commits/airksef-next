# Lokalny PostgreSQL — jedna komenda: docker compose up -d
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: airksef_dev
      POSTGRES_DB: airksef
    ports:
      - "5432:5432"
    volumes:
      - airksef_pgdata:/var/lib/postgresql/data

volumes:
  airksef_pgdata:
